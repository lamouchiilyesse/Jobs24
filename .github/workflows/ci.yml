name: Jobs24 Continuous Integration

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  symfony-tests:
    runs-on: ubuntu-latest

    # Define variables here once so they apply to all steps automatically
    env:
      APP_ENV: test
      DATABASE_URL: "sqlite:///%kernel.project_dir%/var/data.db"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite
          coverage: none

      - name: Validate Composer configuration
        run: composer validate --strict

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Dependencies
        run: composer install --prefer-dist --no-progress --no-suggest

      - name: Prepare Cache and Data Directories
        run: mkdir -p var/cache var/log var/data

      # Safely updates or generates the schema file directly
      - name: Create Test Database Schema
        run: php bin/console doctrine:schema:update --env=test --force

      # Executed using 'php' to bypass any Windows/Linux binary execution restrictions
      - name: Execute Tests
        run: php vendor/bin/phpunit